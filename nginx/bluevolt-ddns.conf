# Single-hostname nginx config for DuckDNS setups.
# Routes:
#   /        -> Next.js on :3001
#   /api/    -> FastAPI on :8000  (path is preserved - FastAPI mounts at /api/v1)
#
# Replace bluevolt.duckdns.org with your actual DuckDNS hostname before installing.

server {
    listen 80;
    listen [::]:80;
    server_name bluevolt.duckdns.org;

    client_max_body_size 10m;

    # FastAPI under /api/ - matches the existing /api/v1/* route prefix
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Next.js handles everything else, including HMR websockets
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
