# nginx reverse proxy for Blue Volt Scientific
# Place at /etc/nginx/sites-available/bluevolt and symlink to sites-enabled.
#
# Replace bluevolt.example.com with your real hostname (or your DDNS hostname).
# This config terminates HTTP only; pair with certbot for HTTPS.

# --- App: web (Next.js on :3001) ---
server {
    listen 80;
    listen [::]:80;
    server_name bluevolt.example.com www.bluevolt.example.com;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# --- API: FastAPI on :8000 ---
server {
    listen 80;
    listen [::]:80;
    server_name api.bluevolt.example.com;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
