services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bluevolt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bluevolt}
      POSTGRES_DB: bluevolt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluevolt"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: ./bluevolt-backend
    env_file: ./bluevolt-backend/.env
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build: ./bluevolt-frontend
    env_file: ./bluevolt-frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
